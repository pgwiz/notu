{% extends "base.html" %}

{% block title %}Login - Notu{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="futuristic-card glow-effect">
            <div class="card-header tw-text-center">
                <h4 class="tw-mb-0">
                    <i class="fas fa-sign-in-alt tw-mr-2 tw-text-green-400"></i>Login
                </h4>
            </div>
            <div class="card-body">
                <form method="POST" class="futuristic-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
                    <div class="tw-mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="tw-mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="tw-mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember_me" name="remember_me">
                        <label class="form-check-label" for="remember_me">
                            Remember me
                        </label>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fas fa-sign-in-alt tw-mr-2"></i>Login
                    </button>
                </form>
            </div>
            <div class="card-footer tw-text-center">
                <p class="tw-mb-0 tw-text-sm tw-text-gray-400">
                    Don't have an account? 
                    <a href="{{ url_for('auth.register') }}" class="tw-text-green-400 tw-no-underline hover:tw-text-green-300">
                        Register here
                    </a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
